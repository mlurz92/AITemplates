<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" shape-rendering="geometricPrecision">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#0f1225"/>
      <stop offset="100%" stop-color="#060710"/>
    </radialGradient>

    <radialGradient id="av" cx="28%" cy="24%" r="66%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ac" cx="74%" cy="36%" r="60%">
      <stop offset="0%" stop-color="#06d6d6" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#06d6d6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ap" cx="52%" cy="84%" r="64%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sg" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="42%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>

    <radialGradient id="discGrad" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#06d6d6" stop-opacity="0.02"/>
    </radialGradient>

    <radialGradient id="coreGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="45%" stop-color="#c4b5fd" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gh" cx="24%" cy="18%" r="56%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="blurAurora" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="1 0 0 0 0.18  0 0.8 0 0 0.08  0 0 1 0 0.55  0 0 0 1.3 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="lineGlow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Aurora blobs -->
  <g filter="url(#blurAurora)">
    <circle cx="310" cy="265" r="295" fill="url(#av)"/>
    <circle cx="755" cy="375" r="278" fill="url(#ac)"/>
    <circle cx="520" cy="835" r="300" fill="url(#ap)"/>
  </g>

  <!-- Glass highlight -->
  <rect width="1024" height="1024" rx="232" fill="url(#gh)"/>

  <!-- Outer border -->
  <rect x="14" y="14" width="996" height="996" rx="222"
        fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="2"/>

  <!-- Glass disc behind sparkle -->
  <circle cx="512" cy="445" r="252"
          fill="url(#discGrad)"
          stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>

  <!-- Ambient halo rings -->
  <circle cx="512" cy="445" r="210" fill="#7c3aed" fill-opacity="0.07"/>
  <circle cx="512" cy="445" r="165" fill="#06d6d6" fill-opacity="0.05"/>

  <!-- 8-pointed sparkle -->
  <g filter="url(#glow)" transform="translate(512, 445)">
    <!-- 4 main arms (N/E/S/W) — long, gradient-filled -->
    <path d="M 0,0 C 22,-76 22,-134 0,-196 C -22,-134 -22,-76 0,0"
          fill="url(#sg)"/>
    <path d="M 0,0 C 22,-76 22,-134 0,-196 C -22,-134 -22,-76 0,0"
          fill="url(#sg)" transform="rotate(90)"/>
    <path d="M 0,0 C 22,-76 22,-134 0,-196 C -22,-134 -22,-76 0,0"
          fill="url(#sg)" transform="rotate(180)"/>
    <path d="M 0,0 C 22,-76 22,-134 0,-196 C -22,-134 -22,-76 0,0"
          fill="url(#sg)" transform="rotate(270)"/>

    <!-- 4 diagonal arms (NE/SE/SW/NW) — shorter, white -->
    <path d="M 0,0 C 11,-42 11,-86 0,-124 C -11,-86 -11,-42 0,0"
          fill="#ffffff" fill-opacity="0.52" transform="rotate(45)"/>
    <path d="M 0,0 C 11,-42 11,-86 0,-124 C -11,-86 -11,-42 0,0"
          fill="#ffffff" fill-opacity="0.52" transform="rotate(135)"/>
    <path d="M 0,0 C 11,-42 11,-86 0,-124 C -11,-86 -11,-42 0,0"
          fill="#ffffff" fill-opacity="0.52" transform="rotate(225)"/>
    <path d="M 0,0 C 11,-42 11,-86 0,-124 C -11,-86 -11,-42 0,0"
          fill="#ffffff" fill-opacity="0.52" transform="rotate(315)"/>
  </g>

  <!-- Bright center core -->
  <circle cx="512" cy="445" r="26" fill="url(#coreGrad)" filter="url(#softGlow)"/>
  <circle cx="512" cy="445" r="11" fill="#ffffff"/>

  <!-- Template lines (representing structured prompts) -->
  <g filter="url(#lineGlow)">
    <rect x="338" y="700" width="348" height="20" rx="10" fill="#ffffff" fill-opacity="0.26"/>
    <rect x="364" y="737" width="296" height="20" rx="10" fill="#ffffff" fill-opacity="0.18"/>
    <rect x="346" y="774" width="332" height="20" rx="10" fill="#ffffff" fill-opacity="0.12"/>
  </g>

  <!-- Decorative accent sparkles -->
  <!-- Top-right (cyan) -->
  <g transform="translate(738, 208)" fill="#22d3ee" opacity="0.88" filter="url(#softGlow)">
    <path d="M 0,0 C 3,-9 3,-17 0,-24 C -3,-17 -3,-9 0,0"/>
    <path d="M 0,0 C 3,-9 3,-17 0,-24 C -3,-17 -3,-9 0,0" transform="rotate(90)"/>
    <path d="M 0,0 C 3,-9 3,-17 0,-24 C -3,-17 -3,-9 0,0" transform="rotate(180)"/>
    <path d="M 0,0 C 3,-9 3,-17 0,-24 C -3,-17 -3,-9 0,0" transform="rotate(270)"/>
  </g>

  <!-- Bottom-left (coral) -->
  <g transform="translate(278, 740)" fill="#ff6b9d" opacity="0.82" filter="url(#softGlow)">
    <path d="M 0,0 C 3,-8 3,-15 0,-21 C -3,-15 -3,-8 0,0"/>
    <path d="M 0,0 C 3,-8 3,-15 0,-21 C -3,-15 -3,-8 0,0" transform="rotate(90)"/>
    <path d="M 0,0 C 3,-8 3,-15 0,-21 C -3,-15 -3,-8 0,0" transform="rotate(180)"/>
    <path d="M 0,0 C 3,-8 3,-15 0,-21 C -3,-15 -3,-8 0,0" transform="rotate(270)"/>
  </g>

  <!-- Tiny accent dots -->
  <circle cx="290" cy="218" r="7" fill="#a78bfa" opacity="0.72"/>
  <circle cx="748" cy="755" r="5" fill="#22d3ee" opacity="0.62"/>
  <circle cx="762" cy="680" r="4" fill="#f472b6" opacity="0.55"/>
</svg>
