<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" style="max-width: 512px; background: transparent;">
    <defs>
        <style>
            /* Endless Loop Keyframes */
            @keyframes aurora-1 {
                0%, 100% { transform: translate(0, 0) scale(1); }
                50% { transform: translate(30px, 20px) scale(1.08); }
            }
            @keyframes aurora-2 {
                0%, 100% { transform: translate(0, 0) scale(1); }
                50% { transform: translate(-35px, 25px) scale(0.92); }
            }
            @keyframes aurora-3 {
                0%, 100% { transform: translate(0, 0) scale(1); }
                50% { transform: translate(20px, -30px) scale(1.05); }
            }
            @keyframes float-glass {
                0%, 100% { transform: translateY(0px); filter: drop-shadow(0 24px 36px rgba(0,0,0,0.5)); }
                50% { transform: translateY(-16px); filter: drop-shadow(0 36px 48px rgba(0,0,0,0.3)); }
            }
            @keyframes pulse-core {
                0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 214, 10, 0.5)); }
                50% { transform: scale(1.12); filter: drop-shadow(0 0 45px rgba(255, 214, 10, 0.9)); }
            }
            @keyframes rotate-slow {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            @keyframes data-flow {
                0% { stroke-dashoffset: 40; }
                100% { stroke-dashoffset: 0; }
            }
            @keyframes node-breathe {
                0%, 100% { opacity: 0.4; transform: scale(0.9); }
                50% { opacity: 1; transform: scale(1.2); }
            }

            /* Klassen-Zuweisungen mit harmonisierten Laufzeiten für nahtlose Loops */
            .bg-aurora-1 { animation: aurora-1 12s ease-in-out infinite; }
            .bg-aurora-2 { animation: aurora-2 16s ease-in-out infinite; }
            .bg-aurora-3 { animation: aurora-3 20s ease-in-out infinite; }
            .glass-card { animation: float-glass 6s ease-in-out infinite; transform-origin: center; }
            .sparkle-core { animation: pulse-core 4s ease-in-out infinite, rotate-slow 16s linear infinite; }
            .stream-line { animation: data-flow 1.5s linear infinite; }
            .node { animation: node-breathe 4s ease-in-out infinite; }
        </style>

        <clipPath id="squircle">
            <rect width="512" height="512" rx="115" />
        </clipPath>

        <filter id="blur-heavy" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="65" />
        </filter>

        <linearGradient id="glass-fill-dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
            <stop offset="40%" stop-color="#ffffff" stop-opacity="0.02" />
            <stop offset="60%" stop-color="#000000" stop-opacity="0.08" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.00" />
        </linearGradient>
        
        <linearGradient id="glass-stroke-dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0.25" />
        </linearGradient>

        <linearGradient id="prompt-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5AC8FA" /> <stop offset="100%" stop-color="#BF5AF2" /> </linearGradient>

        <radialGradient id="sparkle-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFD60A" /> <stop offset="100%" stop-color="#FF9F0A" /> </radialGradient>
    </defs>

    <g clip-path="url(#squircle)">
        <rect width="512" height="512" fill="#0b0e1a" />

        <g filter="url(#blur-heavy)">
            <circle cx="100" cy="80" r="220" fill="#5E5CE6" opacity="0.5" class="bg-aurora-1" />
            <circle cx="460" cy="180" r="190" fill="#5AC8FA" opacity="0.35" class="bg-aurora-2" />
            <circle cx="256" cy="480" r="240" fill="#BF5AF2" opacity="0.4" class="bg-aurora-3" />
        </g>

        <g stroke-linecap="round">
            <path d="M 80 120 L 256 256" stroke="#5E5CE6" stroke-width="4" stroke-dasharray="8 8" opacity="0.6" class="stream-line" />
            <path d="M 440 100 L 256 256" stroke="#5AC8FA" stroke-width="4" stroke-dasharray="8 8" opacity="0.5" class="stream-line" style="animation-duration: 2s;" />
            <path d="M 120 420 L 256 256" stroke="#BF5AF2" stroke-width="4" stroke-dasharray="8 8" opacity="0.6" class="stream-line" style="animation-duration: 1.8s;" />
            <path d="M 420 400 L 256 256" stroke="#FF9F0A" stroke-width="4" stroke-dasharray="8 8" opacity="0.4" class="stream-line" style="animation-duration: 2.2s;" />

            <circle cx="80" cy="120" r="10" fill="#5E5CE6" class="node" style="animation-delay: 0s;" />
            <circle cx="440" cy="100" r="12" fill="#5AC8FA" class="node" style="animation-delay: -1s;" />
            <circle cx="120" cy="420" r="8" fill="#BF5AF2" class="node" style="animation-delay: -2s;" />
            <circle cx="420" cy="400" r="10" fill="#FF9F0A" class="node" style="animation-delay: -3s;" />
        </g>

        <g class="glass-card">
            <rect x="56" y="96" width="400" height="320" rx="52" fill="url(#glass-fill-dark)" />
            <rect x="56" y="96" width="400" height="320" rx="52" fill="none" stroke="url(#glass-stroke-dark)" stroke-width="3" />
            
            <rect x="56" y="96" width="400" height="320" rx="52" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />

            <path d="M 140 186 L 210 256 L 140 326" fill="none" stroke="url(#prompt-grad-dark)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
            
            <g transform="translate(320, 256)">
                <g class="sparkle-core">
                    <path d="M 0 -85 Q 0 0 85 0 Q 0 0 0 85 Q 0 0 -85 0 Q 0 0 0 -85 Z" fill="url(#sparkle-grad)" />
                </g>
            </g>
        </g>
    </g>
</svg>
